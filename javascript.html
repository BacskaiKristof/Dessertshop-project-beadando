	<h1><center>JavaScript CRUD example</center></h1>
	<hr>
	<div class="employee-form">
		<form onsubmit="event.preventDefault();onFormSubmit();">
			<div>
				<label>Sütemény név</label><label class="validation-error hide" id="SüteményValidationError">This field is required.</label>
				<input type="text" name="SüteményNév" id="SüteményNév">
			</div>
			<div>
				<label>Sütemény Típus</label>
				<input type="text" name="SüteményTípus" id="SüteményTípus">
			</div>
			<div>
				<label>ÁR</label>
				<input type="text" name="ÁR" id="ÁR">
			</div>
			
			<div  class="form-action-buttons">
				<input type="submit" value="Submit">
			</div>
		</form>
	</div>
	<br/>
	<div class = "employees-table">
		<table class="list" id="employeeList">
			<thead>
				<tr>
					<th>Sütemény név</th>
					<th>Típus</th>
					<th>Ár</th>
					
					<th>Actions</th>
				</tr>
